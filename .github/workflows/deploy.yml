name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      APP_DIR: ${{ vars.DEPLOY_PATH || '/opt/521wolf/app' }}
      ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/opt/521wolf/.env' }}
      SERVICE_NAME: ${{ vars.DEPLOY_SERVICE_NAME || '521wolf' }}
      HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL || 'http://127.0.0.1:8000/api/health' }}
      HEALTH_TIMEOUT_SECONDS: ${{ vars.DEPLOY_HEALTH_TIMEOUT_SECONDS || '60' }}
      APP_BASE_URL: ${{ vars.DEPLOY_APP_BASE_URL || format('http://{0}', secrets.DEPLOY_HOST) }}
      API_HEALTH_URL: ${{ vars.DEPLOY_API_HEALTH_URL || vars.DEPLOY_HEALTH_URL || 'http://127.0.0.1:8000/api/health' }}
      POST_DEPLOY_SMOKE: ${{ vars.POST_DEPLOY_SMOKE || 'true' }}
      CHECK_NGINX: ${{ vars.POST_DEPLOY_CHECK_NGINX || 'true' }}
      CHECK_SYSTEMD: ${{ vars.POST_DEPLOY_CHECK_SYSTEMD || 'true' }}
      CHECK_PORTS: ${{ vars.POST_DEPLOY_CHECK_PORTS || 'true' }}
      REQUIRE_HTTPS: ${{ vars.POST_DEPLOY_REQUIRE_HTTPS || 'false' }}
      CURL_INSECURE: ${{ vars.POST_DEPLOY_CURL_INSECURE || 'false' }}
      HTTPS_BASE_URL: ${{ vars.DEPLOY_HTTPS_BASE_URL || '' }}
      ENABLE_SELF_SIGNED_SSL: ${{ vars.DEPLOY_ENABLE_SELF_SIGNED_SSL || 'false' }}
      SERVER_NAME: ${{ vars.DEPLOY_SERVER_NAME || secrets.DEPLOY_HOST }}
      PYPI_INDEX_URL: ${{ vars.PYPI_INDEX_URL || 'https://mirrors.aliyun.com/pypi/simple' }}
      NPM_CONFIG_REGISTRY: ${{ vars.NPM_CONFIG_REGISTRY || 'https://registry.npmmirror.com' }}
      UV_RELOCK_FOR_INDEX: ${{ vars.UV_RELOCK_FOR_INDEX || 'true' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload source
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$APP_DIR'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude '.venv/' \
            --exclude 'node_modules/' \
            --exclude 'ui/frontend/node_modules/' \
            --exclude 'ui/frontend/dist/' \
            --exclude 'runs/' \
            --exclude 'data/' \
            --exclude '*.log' \
            --exclude '*.pid' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/"

      - name: Run deploy script
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$APP_DIR' ENV_FILE='$ENV_FILE' SERVICE_NAME='$SERVICE_NAME' HEALTH_URL='$HEALTH_URL' HEALTH_TIMEOUT_SECONDS='$HEALTH_TIMEOUT_SECONDS' APP_BASE_URL='$APP_BASE_URL' API_HEALTH_URL='$API_HEALTH_URL' POST_DEPLOY_SMOKE='$POST_DEPLOY_SMOKE' CHECK_NGINX='$CHECK_NGINX' CHECK_SYSTEMD='$CHECK_SYSTEMD' CHECK_PORTS='$CHECK_PORTS' REQUIRE_HTTPS='$REQUIRE_HTTPS' CURL_INSECURE='$CURL_INSECURE' HTTPS_BASE_URL='$HTTPS_BASE_URL' ENABLE_SELF_SIGNED_SSL='$ENABLE_SELF_SIGNED_SSL' SERVER_NAME='$SERVER_NAME' PYPI_INDEX_URL='$PYPI_INDEX_URL' NPM_CONFIG_REGISTRY='$NPM_CONFIG_REGISTRY' UV_RELOCK_FOR_INDEX='$UV_RELOCK_FOR_INDEX' SKIP_GIT_UPDATE=true bash '$APP_DIR/deploy/scripts/deploy.sh'"
