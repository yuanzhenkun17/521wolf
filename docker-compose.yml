name: nightcouncil

x-app-env: &app-env
  POSTGRES_DATABASE_URL: postgresql://${POSTGRES_USER:-wolf_app}:${POSTGRES_PASSWORD:-wolf_password}@postgres:5432/${POSTGRES_DB:-wolf_app}
  DATABASE_URL: postgresql://${POSTGRES_USER:-wolf_app}:${POSTGRES_PASSWORD:-wolf_password}@postgres:5432/${POSTGRES_DB:-wolf_app}
  UI_BACKEND_ROOT: /app
  WOLF_USE_PG_TASK_QUEUE: "true"
  TASK_WORKER_REQUIRED: "true"
  PG_POOL_MIN_SIZE: ${PG_POOL_MIN_SIZE:-1}
  PG_POOL_MAX_SIZE: ${PG_POOL_MAX_SIZE:-10}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wolf_app}
      POSTGRES_USER: ${POSTGRES_USER:-wolf_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wolf_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: backend
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv run --no-sync alembic upgrade head &&
             uv run --no-sync python -m app.tools.seed_default_baseline"
    restart: "no"

  api:
    build:
      context: .
      target: backend
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes:
      - app_runs:/app/runs
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      target: backend
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes:
      - app_runs:/app/runs
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["uv", "run", "--no-sync", "python", "-m", "app.tools.run_ui_task_worker", "--worker-id", "docker-worker"]
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  app_runs:
  app_data:
