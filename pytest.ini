[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
markers =
    unit: fast, focused tests for pure functions, helpers, and narrow module behavior
    contract: API, persistence, and compatibility contract tests that lock external behavior
    integration: cross-module pipeline tests that exercise multiple app/storage/engine components
    stress: concurrency, atomicity, contention, or retention-oriented tests
    smoke: small end-to-end or import-surface checks intended for quick health verification
