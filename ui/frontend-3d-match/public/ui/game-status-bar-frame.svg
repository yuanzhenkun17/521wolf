<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 132" width="1120" height="132" preserveAspectRatio="none" role="img" aria-label="Horizontal game status bar frame">
  <defs>
    <!-- Main wood tone for the thin frame -->
    <linearGradient id="woodBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b37b46"/>
      <stop offset="14%" stop-color="#6b3b1f"/>
      <stop offset="42%" stop-color="#9b6031"/>
      <stop offset="72%" stop-color="#4e2814"/>
      <stop offset="100%" stop-color="#c18a51"/>
    </linearGradient>

    <!-- Fine highlight running around the wooden rim -->
    <linearGradient id="woodHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2c78f" stop-opacity="0.18"/>
      <stop offset="20%" stop-color="#f7deb4" stop-opacity="0.62"/>
      <stop offset="50%" stop-color="#fff1cf" stop-opacity="0.18"/>
      <stop offset="80%" stop-color="#f7deb4" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#f2c78f" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Paper / parchment fill -->
    <linearGradient id="paperFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efd7a5"/>
      <stop offset="48%" stop-color="#e7c789"/>
      <stop offset="100%" stop-color="#d9ad6b"/>
    </linearGradient>

    <!-- Warm center glow for the parchment -->
    <radialGradient id="paperGlow" cx="50%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#f7e4bc" stop-opacity="0.42"/>
      <stop offset="58%" stop-color="#f3d8a4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f3d8a4" stop-opacity="0"/>
    </radialGradient>

    <!-- Slight cool tint for night atmosphere -->
    <radialGradient id="nightTint" cx="50%" cy="38%" r="90%">
      <stop offset="0%" stop-color="#5f71ad" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#31406b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#13192b" stop-opacity="0.10"/>
    </radialGradient>

    <!-- Very light parchment grain -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.015"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <!-- Wood texture only on the border -->
    <filter id="woodTexture" x="-10%" y="-60%" width="120%" height="220%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.28" numOctaves="3" seed="12" result="woodNoise"/>
      <feColorMatrix in="woodNoise" type="matrix"
        values="0.55 0 0 0 0.18
                0 0.40 0 0 0.11
                0 0 0.28 0 0.04
                0 0 0 0.20 0" result="woodColor"/>
      <feBlend in="SourceGraphic" in2="woodColor" mode="multiply"/>
    </filter>

    <!-- Small cap ornaments clipped inside ends -->
    <linearGradient id="capShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4827" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d09a5d" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Transparent outer background by default -->

  <!-- Parchment panel fills most of the space so the frame stays thin -->
  <rect x="16" y="16" width="1088" height="100" rx="10" fill="url(#paperFill)" filter="url(#grain)"/>
  <rect x="16" y="16" width="1088" height="100" rx="10" fill="url(#paperGlow)"/>
  <rect x="16" y="16" width="1088" height="100" rx="10" fill="url(#nightTint)"/>

  <!-- Thin outer wood frame -->
  <rect x="8.5" y="8.5" width="1103" height="115" rx="12" fill="none" stroke="url(#woodBase)" stroke-width="7"/>
  <rect x="8.5" y="8.5" width="1103" height="115" rx="12" fill="none" stroke="#9d6737" stroke-width="7" opacity="0.30" filter="url(#woodTexture)"/>
  <rect x="5.5" y="5.5" width="1109" height="121" rx="14" fill="none" stroke="url(#woodHighlight)" stroke-width="1.2" opacity="0.75"/>
  <rect x="12.5" y="12.5" width="1095" height="107" rx="10.5" fill="none" stroke="#1f0e07" stroke-width="1.1" opacity="0.78"/>

  <!-- Thin inner trim -->
  <rect x="20" y="20" width="1080" height="92" rx="8" fill="none" stroke="#a67439" stroke-width="0.9" opacity="0.70"/>
  <rect x="23" y="23" width="1074" height="86" rx="7" fill="none" stroke="#6c4322" stroke-width="0.45" opacity="0.25"/>

  <!-- Gentle end caps to suggest wrapped wooden ends without making the frame bulky -->
  <path d="M16 24 Q26 20 36 24 L36 108 Q26 112 16 108 Z" fill="url(#capShade)" opacity="0.24"/>
  <path d="M1104 24 Q1094 20 1084 24 L1084 108 Q1094 112 1104 108 Z" fill="url(#capShade)" opacity="0.24"/>
</svg>
