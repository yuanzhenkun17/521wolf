<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2240 132" width="2240" height="132" preserveAspectRatio="none" role="img" aria-label="Horizontal full game status bar frame">
  <defs>
    <!-- Thin wood border -->
    <linearGradient id="woodBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8834c"/>
      <stop offset="14%" stop-color="#68381d"/>
      <stop offset="42%" stop-color="#996031"/>
      <stop offset="72%" stop-color="#4b2814"/>
      <stop offset="100%" stop-color="#c79257"/>
    </linearGradient>

    <!-- Fine border highlight -->
    <linearGradient id="woodHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1c88f" stop-opacity="0.12"/>
      <stop offset="18%" stop-color="#f8e1b9" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#fff4d8" stop-opacity="0.16"/>
      <stop offset="82%" stop-color="#f8e1b9" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#f1c88f" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Parchment fill -->
    <linearGradient id="paperFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eed5a2"/>
      <stop offset="48%" stop-color="#e5c484"/>
      <stop offset="100%" stop-color="#d6aa66"/>
    </linearGradient>

    <!-- Warm inner glow -->
    <radialGradient id="paperGlow" cx="50%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#f7e2b7" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#f2d7a1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f2d7a1" stop-opacity="0"/>
    </radialGradient>

    <!-- Slight cool tint for night ambience -->
    <radialGradient id="nightTint" cx="50%" cy="38%" r="90%">
      <stop offset="0%" stop-color="#5f73b0" stop-opacity="0.04"/>
      <stop offset="62%" stop-color="#32416b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#161b2c" stop-opacity="0.09"/>
    </radialGradient>

    <!-- Very subtle paper grain -->
    <filter id="paperGrain" x="-10%" y="-20%" width="120%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.012"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>

    <!-- Border texture -->
    <filter id="woodTexture" x="-10%" y="-60%" width="120%" height="220%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.28" numOctaves="3" seed="12" result="woodNoise"/>
      <feColorMatrix in="woodNoise" type="matrix"
        values="0.52 0 0 0 0.18
                0 0.38 0 0 0.11
                0 0 0.26 0 0.04
                0 0 0 0.18 0" result="woodColor"/>
      <feBlend in="SourceGraphic" in2="woodColor" mode="multiply"/>
    </filter>

    <!-- End cap shading for slight wooden closure at both ends -->
    <linearGradient id="endShadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e3d20" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d09a5d" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="endShadeR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#6e3d20" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d09a5d" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Transparent background by default -->

  <!-- Main parchment area: square corners, clean edges -->
  <rect x="14" y="14" width="2212" height="104" fill="url(#paperFill)" filter="url(#paperGrain)"/>
  <rect x="14" y="14" width="2212" height="104" fill="url(#paperGlow)"/>
  <rect x="14" y="14" width="2212" height="104" fill="url(#nightTint)"/>

  <!-- Thin wooden outer frame -->
  <rect x="7" y="7" width="2226" height="118" fill="none" stroke="url(#woodBorder)" stroke-width="6"/>
  <rect x="7" y="7" width="2226" height="118" fill="none" stroke="#945f32" stroke-width="6" opacity="0.28" filter="url(#woodTexture)"/>
  <rect x="4.5" y="4.5" width="2231" height="123" fill="none" stroke="url(#woodHighlight)" stroke-width="1" opacity="0.72"/>
  <rect x="10.5" y="10.5" width="2219" height="111" fill="none" stroke="#1f0e07" stroke-width="1" opacity="0.76"/>

  <!-- Clean inner trim -->
  <rect x="18" y="18" width="2204" height="96" fill="none" stroke="#a8743a" stroke-width="0.85" opacity="0.64"/>
  <rect x="21" y="21" width="2198" height="90" fill="none" stroke="#694121" stroke-width="0.4" opacity="0.22"/>

  <!-- Slight end framing for left/right closures -->
  <rect x="14" y="18" width="42" height="96" fill="url(#endShadeL)" opacity="0.24"/>
  <rect x="2184" y="18" width="42" height="96" fill="url(#endShadeR)" opacity="0.24"/>
</svg>
